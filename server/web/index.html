    const VID_RING_R = 94;
    const VID_RING_LEN = 2 * Math.PI * VID_RING_R;
    const VID_RING_PATH = `M 100 ${100 - VID_RING_R} A ${VID_RING_R} ${VID_RING_R} 0 1 1 99.999 ${100 - VID_RING_R}`;
    const VIDEO_NOTE_PREVIEW_SEC = 1;

    function videoNoteMediaSrc(url) {
      if (!url) return url;
      const base = String(url).split('#')[0];
      return `${base}#t=${VIDEO_NOTE_PREVIEW_SEC}`;
    }

    function videoNotePreviewTime(vid) {
      const dur = videoNoteDuration(vid);
      if (!dur) return VIDEO_NOTE_PREVIEW_SEC;
      return Math.min(VIDEO_NOTE_PREVIEW_SEC, Math.max(0, dur - 0.05));
    }

    function videoNoteDuration(vid) {
      if (!vid) return 0;
      let d = saneDur(vid.duration);
      if (!d && vid.buffered?.length) {
        d = saneDur(vid.buffered.end(vid.buffered.length - 1));
      }
      return d;
    }

    function resetVideoNotePreviewRing(wrap) {
      if (!wrap) return;
      initVideoRing(wrap);
      wrap.classList.remove('viewed');
    }

    function captureVideoNotePoster(vid) {
      if (!vid?.videoWidth) return '';
      try {
        const size = Math.max(vid.videoWidth, vid.videoHeight, 120);
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const vw = vid.videoWidth;
        const vh = vid.videoHeight;
        const side = Math.min(vw, vh);
        const sx = (vw - side) / 2;
        const sy = (vh - side) / 2;
        ctx.drawImage(vid, sx, sy, side, side, 0, 0, size, size);
        return canvas.toDataURL('image/jpeg', 0.84);
      } catch {
        return '';
      }
    }

    async function ensureVideoNotePreviewFrame(vid, wrap) {
      if (!vid || vid.dataset.previewPrimed === '1') return;
      const waitFor = (event, test) => new Promise((resolve) => {
        if (test()) resolve();
        else vid.addEventListener(event, () => resolve(), { once: true });
      });
      const seekToPreview = () => new Promise((resolve) => {
        const t = videoNotePreviewTime(vid);
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          resolve();
        };
        vid.addEventListener('seeked', finish, { once: true });
        setTimeout(finish, 500);
        try { vid.currentTime = t; } catch { finish(); }
      });
      try {
        await waitFor('loadedmetadata', () => vid.readyState >= 1);
        await waitFor('loadeddata', () => vid.readyState >= 2);
        await seekToPreview();
        const wasMuted = vid.muted;
        vid.muted = true;
        try {
          await vid.play();
          await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
          vid.pause();
          await seekToPreview();
        } catch { /* WebKit may block until gesture — poster still attempted */ }
        vid.muted = wasMuted;
        const poster = captureVideoNotePoster(vid);
        if (poster) vid.poster = poster;
        vid.dataset.previewPrimed = '1';
        if (wrap && wrap.dataset.vnotePlayed !== '1') resetVideoNotePreviewRing(wrap);
      } catch { /* ignore */ }
    }

    function primeVideoNotePreview(vid, wrap) {
      ensureVideoNotePreviewFrame(vid, wrap);
    }

    function seekVideoNotePreview(vid) {
      if (!vid) return;
      try { vid.currentTime = videoNotePreviewTime(vid); } catch { /* ignore */ }
    }

    function restoreVideoNotePreview(vid, wrap) {
      if (!vid) return;
      if (!saneDur(vid.duration)) return;
      if (wrap) {
        vid.addEventListener('seeked', () => resetVideoNotePreviewRing(wrap), { once: true });
      }
      seekVideoNotePreview(vid);
    }

    function saneDur(d) {
      return d > 0 && Number.isFinite(d) ? d : 0;
    }

    function cacheVoiceDuration(el, audio) {
      if (!el || !audio) return 0;
      let d = saneDur(audio.duration);
      if (!d && audio.buffered?.length) {
        d = saneDur(audio.buffered.end(audio.buffered.length - 1));
      }
      if (d) {
        el.dataset.duration = String(d);
        const durEl = el.querySelector('.voice-dur');
        if (durEl) durEl.textContent = fmtTime(d);
      }
      return d || saneDur(Number(el.dataset.duration));
    }

    function voiceDuration(el, audio) {
      return cacheVoiceDuration(el, audio) || saneDur(Number(el?.dataset.duration));
    }

    function getDuration(src) {
      return new Promise((resolve) => {
        const a = new Audio();
        a.preload = 'auto';
        let settled = false;
        const done = (d) => {
          if (settled) return;
          settled = true;
          resolve(saneDur(d));
        };
        a.onloadedmetadata = () => done(a.duration);
        a.ondurationchange = () => done(a.duration);
        a.oncanplay = () => done(a.duration);
        a.onerror = () => done(0);
        setTimeout(() => done(a.duration), 2500);
        a.src = src;
        a.load();
      });
    }

    async function getWaveform(src) {
      if (waveCache.has(src)) return waveCache.get(src);
      const promise = (async () => {
        const res = await fetch(src);
        const buf = await res.arrayBuffer();
        const Ctx = window.AudioContext || window.webkitAudioContext;
        const ctx = new Ctx();
        const audio = await ctx.decodeAudioData(buf.slice(0));
        const data = audio.getChannelData(0);
        const bars = 52;
        const block = Math.max(1, Math.floor(data.length / bars));
        const peaks = [];
        for (let i = 0; i < bars; i++) {
          let max = 0;
          const start = i * block;
          for (let j = 0; j < block && start + j < data.length; j++) {
            max = Math.max(max, Math.abs(data[start + j]));
          }
          peaks.push(max);
        }
        const top = Math.max(...peaks, 0.001);
        ctx.close();
        return { peaks: peaks.map((p) => p / top), duration: audio.duration };
      })();
      waveCache.set(src, promise);
      return promise;
    }

    function paintWaveform(barsEl, peaks) {
      barsEl.innerHTML = peaks.map((p) => {
        const h = Math.max(18, Math.round(p * 48));
        return `<i style="height:${h}%"></i>`;
      }).join('');
    }

    function wavePctFromPointer(waveEl, clientX) {
      const rect = waveEl.getBoundingClientRect();
      if (!rect.width) return 0;
      return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    }

    function wireVoiceWaveScrub(waveEl, opts) {
      const config = typeof opts === 'function' ? { seek: opts } : opts;
      const { seek, onStart, onEnd } = config;
      if (!waveEl || waveEl.dataset.scrubWired || !seek) return;
      waveEl.dataset.scrubWired = '1';
      let scrubbing = false;

      const applySeek = (clientX) => {
        seek(wavePctFromPointer(waveEl, clientX));
      };

      const endScrub = (e) => {
        if (!scrubbing) return;
        scrubbing = false;
        voiceScrubbing = false;
        waveEl.classList.remove('scrubbing');
        onEnd?.();
        try { waveEl.releasePointerCapture(e.pointerId); } catch (_) {}
      };

      waveEl.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        scrubbing = true;
        voiceScrubbing = true;
        waveEl.classList.add('scrubbing');
        onStart?.();
        waveEl.setPointerCapture(e.pointerId);
        applySeek(e.clientX);
        e.preventDefault();
        e.stopPropagation();
      });

      waveEl.addEventListener('pointermove', (e) => {
        if (!scrubbing) return;
        applySeek(e.clientX);
        e.preventDefault();
      });

      waveEl.addEventListener('pointerup', endScrub);
      waveEl.addEventListener('pointercancel', endScrub);
    }

    function beginVoiceScrubChat(el, src) {
      voiceScrubResumeChat = null;
      if (voiceAudio && !voiceAudio.paused) {
        if (voiceAudio.dataset.glinkSrc === src) voiceScrubResumeChat = { el, src };
        voiceAudio.pause();
        if (voiceBtnEl) voiceBtnEl.textContent = '▶';
        stopVoiceRaf();
      }
    }

    function finishVoiceScrubChat(el, src) {
      const resume = voiceScrubResumeChat?.src === src;
      voiceScrubResumeChat = null;
      if (voiceAudio?.dataset.glinkSrc !== src) return;
      voiceAudio.currentTime = voicePos.get(src) || 0;
      if (!resume) return;
      const btn = el.querySelector('.voice-play');
      voiceBtnEl = btn;
      voiceMsgEl = el;
      btn.textContent = '⏸';
      voiceAudio.play().then(() => {
        cacheVoiceDuration(el, voiceAudio);
        updateVoiceProgress(el, voiceAudio.currentTime, voiceDuration(el, voiceAudio));
        trackVoiceProgress(el);
      }).catch(() => {

    function beginVoiceReviewScrub() {

    function finishVoiceReviewScrub() {

    function updateVoiceProgress(el, current, duration) {
      if (!el) return;
      const dur = saneDur(duration) || voiceDuration(el, voiceAudio);
      const cur = Math.max(0, current || 0);
      const pct = dur > 0 ? Math.min(100, (cur / dur) * 100) : 0;
      const wave = el.querySelector('.voice-wave');
      if (wave) wave.style.setProperty('--pct', pct + '%');
      const bars = el.querySelectorAll('.voice-bars i');
      const active = bars.length ? Math.ceil((pct / 100) * bars.length) : 0;
      bars.forEach((bar, i) => bar.classList.toggle('on', i < active));
      const curEl = el.querySelector('.voice-cur');
      if (curEl) curEl.textContent = fmtTime(cur);
    }

    function seekVoice(el, src, pct) {
      const dur = voiceDuration(el, voiceAudio?.dataset.glinkSrc === src ? voiceAudio : null);
      const time = Math.max(0, Math.min(dur, pct * dur));
      voicePos.set(src, time);
      updateVoiceProgress(el, time, dur);
      if (voiceScrubbing) return;
      if (voiceAudio?.dataset.glinkSrc === src) voiceAudio.currentTime = time;
    }

    function stopVoiceRaf() {
      if (voiceRaf) cancelAnimationFrame(voiceRaf);
      voiceRaf = null;
    }

    function trackVoiceProgress(el) {
      stopVoiceRaf();
      const tick = () => {
        if (!voiceAudio || voiceAudio.paused || voiceMsgEl !== el) return;
        if (voiceScrubbing) {
          voiceRaf = requestAnimationFrame(tick);
          return;
        }
        const dur = voiceDuration(el, voiceAudio);
        const t = voiceAudio.currentTime;
        voicePos.set(voiceAudio.dataset.glinkSrc, t);
        updateVoiceProgress(el, t, dur);
        voiceRaf = requestAnimationFrame(tick);
      };
      voiceRaf = requestAnimationFrame(tick);
    }

    function hookVoiceDuration(el, src, btn) {
      const sync = () => {
        const dur = cacheVoiceDuration(el, voiceAudio);

      voiceAudio.addEventListener('loadedmetadata', sync);
      voiceAudio.addEventListener('durationchange', sync);
      voiceAudio.addEventListener('canplay', sync);
      voiceAudio.addEventListener('timeupdate', () => {
        if (voiceMsgEl !== el || voiceScrubbing) return;
        voicePos.set(src, voiceAudio.currentTime);
        updateVoiceProgress(el, voiceAudio.currentTime, voiceDuration(el, voiceAudio));

      el.dataset.ready = '1';

    function initVideoRing(wrap) {
      const ring = wrap.querySelector('.vid-ring-fill');
      if (!ring || ring.dataset.ready) return;
      ring.dataset.ready = '1';
      if (ring.tagName === 'PATH' && !ring.getAttribute('d')) {
        ring.setAttribute('d', VID_RING_PATH);
      }
      const len = ring.getTotalLength?.() || VID_RING_LEN;
      ring.dataset.len = String(len);
      ring.setAttribute('stroke-dasharray', String(len));
      ring.setAttribute('stroke-dashoffset', String(len));
    }

    function videoRingLen(ring) {
      if (!ring) return VID_RING_LEN;
      const stored = Number(ring.dataset.len);
      if (stored > 0) return stored;
      const len = ring.getTotalLength?.() || VID_RING_LEN;
      ring.dataset.len = String(len);
      return len;
    }

    function setVideoRingOffset(ring, offset) {
      ring.setAttribute('stroke-dashoffset', String(offset));
    }

    function updateVideoRing(wrap, vid) {
      const ring = wrap.querySelector('.vid-ring-fill');
      if (!ring || !vid) return;
      const len = videoRingLen(ring);
      const dur = videoNoteDuration(vid);
      if (!dur) {
        if (wrap.classList.contains('playing') || wrap.classList.contains('seeking')) {
          ring.style.opacity = '1';
          setVideoRingOffset(ring, len * 0.985);
        }
        return;
      }
      const pct = Math.min(1, Math.max(0, vid.currentTime / dur));
      ring.style.opacity = '1';
      ring.setAttribute('stroke-linecap', pct >= 0.995 ? 'round' : 'butt');
      setVideoRingOffset(ring, len * (1 - pct));
      wrap.classList.toggle('viewed', pct > 0.005);
    }

    function beginVideoNotePlay(wrap, vid) {
      wrap.dataset.vnotePlayed = '1';
      wrap.classList.add('playing');
      initVideoRing(wrap);
      updateVideoRing(wrap, vid);
    }

    function wireVideoNotePlayback(wrap, vid, trackFn = trackVideoProgress) {
      if (vid.dataset.playbackWired) return;
      vid.dataset.playbackWired = '1';
      vid.addEventListener('playing', () => {
        beginVideoNotePlay(wrap, vid);
        trackFn(wrap, vid);
      });
      vid.addEventListener('timeupdate', () => {
        if (vid.paused || vid.ended || !wrap.classList.contains('playing')) return;
        updateVideoRing(wrap, vid);
      });
      const refreshRing = () => updateVideoRing(wrap, vid);
      vid.addEventListener('durationchange', refreshRing);
      vid.addEventListener('loadedmetadata', refreshRing);
    }

    function isOnVideoRing(wrap, x, y) {
      const rect = wrap.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dist = Math.hypot(x - cx, y - cy);
      const half = rect.width / 2;
      return dist >= half * 0.78 && dist <= half + 4;
    }

    function seekVideoNote(wrap, vid, x, y) {
      const rect = wrap.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let angle = Math.atan2(x - cx, -(y - cy));
      if (angle < 0) angle += Math.PI * 2;
      const pct = angle / (Math.PI * 2);
      const dur = videoNoteDuration(vid);
      if (!dur) return;
      vid.currentTime = Math.max(0, Math.min(dur, pct * dur));
      wrap.classList.add('seeking');
      updateVideoRing(wrap, vid);
    }

    function hookVideoProgress(wrap, vid) {
      primeVideoNotePreview(vid, wrap);
      vid.onpause = () => {
        stopVideoRaf();
        if (wrap.dataset.vnotePlayed === '1') updateVideoRing(wrap, vid);
        else resetVideoNotePreviewRing(wrap);
      };
    }

    function wireVideoNotes(container) {
      container.querySelectorAll('.video-note').forEach((wrap) => {
        if (wrap.dataset.wired) return;
        wrap.dataset.wired = '1';
        const vid = wrap.querySelector('video');
        const src = wrap.dataset.src;
        initVideoRing(wrap);
        hookVideoProgress(wrap, vid);
        wireVideoNotePlayback(wrap, vid);

        wrap.addEventListener('pointerdown', (e) => {
          if (e.pointerType === 'mouse' && e.button !== 0) return;
          e.preventDefault();
          if (isOnVideoRing(wrap, e.clientX, e.clientY)) {
            wrap.setPointerCapture(e.pointerId);
            wrap.classList.add('seeking');
            wrap.dataset.seeking = '1';
            seekVideoNote(wrap, vid, e.clientX, e.clientY);
            playVideoNote(wrap, vid, src);
          } else {
            toggleVideoNote(wrap, vid, src);
          }
        });

        wrap.addEventListener('pointermove', (e) => {
          if (wrap.dataset.seeking !== '1') return;
          seekVideoNote(wrap, vid, e.clientX, e.clientY);
        });

        const endSeek = (e) => {
          if (wrap.dataset.seeking !== '1') return;
          if (e?.pointerId != null && wrap.hasPointerCapture?.(e.pointerId)) {
            wrap.releasePointerCapture(e.pointerId);
          }
          wrap.dataset.seeking = '';
          wrap.classList.remove('seeking');
        };
        wrap.addEventListener('pointerup', endSeek);
        wrap.addEventListener('pointercancel', endSeek);

        vid.onended = () => {
          wrap.classList.remove('playing');
          stopVideoRaf();
          if (activeVideoEl === vid) activeVideoEl = null;
          wrap.classList.add('viewed');
          const ring = wrap.querySelector('.vid-ring-fill');

    function playVideoNote(wrap, vid, src) {

    function videoMimeType() {
      const apple = /iPad|iPhone|iPod/.test(navigator.userAgent)
        || (navigator.userAgent.includes('Mac') && 'ontouchend' in document);
      const types = apple
        ? ['video/mp4', 'video/webm;codecs=vp8,opus', 'video/webm']
        : ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm', 'video/mp4'];
      return types.find((t) => MediaRecorder.isTypeSupported(t)) || '';
    }

    function videoExt(mime) {

    async function resolveVideoCamDevices() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter((d) => d.kind === 'videoinput');
        let front = null;
        let back = null;
        for (const d of cams) {
          const label = (d.label || '').toLowerCase();
          if (/front|user|selfie|facetime|передн/.test(label)) front = front || d.deviceId;
          else if (/back|rear|environment|задн|camera 0|cam 0/.test(label)) back = back || d.deviceId;
        }
        if (!front && cams[0]) front = cams[0].deviceId;
        if (!back && cams.length > 1) {
          back = cams.find((d) => d.deviceId !== front)?.deviceId || cams[1].deviceId;
        }
        videoCamDevices = { front, back, count: cams.length };
      } catch {
        videoCamDevices = { front: null, back: null, count: 0 };
      }
      return videoCamDevices;
    }

    function videoConstraints(facingMode, withAudio) {
      const deviceId = facingMode === 'user' ? videoCamDevices?.front : videoCamDevices?.back;
      const video = deviceId
        ? { deviceId: { exact: deviceId }, width: { ideal: 640 }, height: { ideal: 640 } }
        : { facingMode: { ideal: facingMode }, width: { ideal: 640 }, height: { ideal: 640 } };
      return withAudio ? { video, audio: true } : { video, audio: false };
    }

    async function acquireVideoOnlyTrack(facingMode) {
      await resolveVideoCamDevices();
      try {
        const stream = await navigator.mediaDevices.getUserMedia(videoConstraints(facingMode, false));
        return stream.getVideoTracks()[0];
      } catch {
        return (await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: facingMode }, width: { ideal: 640 }, height: { ideal: 640 } },
          audio: false,
        })).getVideoTracks()[0];
      }
    }

      if (state === 'paused' && pauseStart) ms -= Date.now() - pauseStart;

    async function flipVideoCamera() {
      if (!videoStream || videoRecStage !== 'record') return;
      const state = videoRecorder?.state;
      const shouldResume = state === 'recording';
      if (state === 'recording' || state === 'paused') {
        try { videoRecorder.pause(); } catch { /* ignore */ }
        if (state === 'recording') videoRecPauseStart = Date.now();
      }
      const nextFacing = videoFacingMode === 'user' ? 'environment' : 'user';
      try {
        const oldTrack = videoStream.getVideoTracks()[0];
        let newTrack = null;
        if (oldTrack?.applyConstraints) {
          try {
            await oldTrack.applyConstraints({ facingMode: { ideal: nextFacing } });
            const settings = oldTrack.getSettings?.() || {};
            if (settings.facingMode === nextFacing || settings.facingMode === (nextFacing === 'user' ? 'left' : 'right')) {
              videoFacingMode = nextFacing;
              applyVideoPreviewMirror();
              if (shouldResume) {
                videoRecAccumPaused += Date.now() - videoRecPauseStart;
                videoRecPauseStart = 0;
                try { videoRecorder.resume(); } catch { /* ignore */ }
                $('videoPauseBtn').textContent = '⏸';
                $('videoRecStatus').textContent = '⭕ идёт запись';
              } else if (state === 'paused') {
                $('videoRecStatus').textContent = '⏸ пауза';
              }
              syncVideoRecPulse();
              return;
            }
          } catch { /* fall through to track swap */ }
        }
        videoFacingMode = nextFacing;
        newTrack = await acquireVideoOnlyTrack(videoFacingMode);
        if (oldTrack) {
          videoStream.removeTrack(oldTrack);
          oldTrack.stop();
        }
        videoStream.addTrack(newTrack);
        const preview = $('videoRecPreview');
        preview.srcObject = videoStream;
        applyVideoPreviewMirror();
        await preview.play().catch(() => {});
        if (shouldResume) {
          videoRecAccumPaused += Date.now() - videoRecPauseStart;
          videoRecPauseStart = 0;
          try { videoRecorder.resume(); } catch { /* ignore */ }
          $('videoPauseBtn').textContent = '⏸';
          $('videoRecStatus').textContent = '⭕ идёт запись';
        } else if (state === 'paused') {
          $('videoRecStatus').textContent = '⏸ пауза';
        }
      } catch (e) {
        showAppErr('не удалось переключить камеру');
      }
      syncVideoRecPulse();
    }

    async function openVideoRecorder() {
      if (!activeChat || videoRecorder || videoStarting || mediaRecorder) return;
      if (!window.MediaRecorder) {
        showAppErr('запись видео не поддерживается — обнови браузер');
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia) {
        showAppErr('камера недоступна — нужен HTTPS');
        return;
      }
      if (!window.isSecureContext && location.hostname !== 'localhost') {
        showAppErr('видео работает только по HTTPS');
        return;
      }

      videoStarting = true;
      videoDiscard = false;
      videoChunks = [];
      videoFacingMode = 'user';
      videoCamDevices = null;
      videoRecAccumPaused = 0;
      videoRecPauseStart = 0;
      clearVideoReview();
      showVideoRecordUI();
      $('videoRecOverlay').classList.remove('hidden');
      $('videoRecStatus').textContent = 'включаю камеру…';
      $('videoRecTimer').textContent = '0:00';
      $('videoPauseBtn').textContent = '⏸';
      if (!mediaRecorderCanPause()) $('videoPauseBtn').style.display = 'none';
      else $('videoPauseBtn').style.display = '';
      $('mediaBtn').classList.add('recording');

      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: videoFacingMode }, width: { ideal: 640 }, height: { ideal: 640 } },
          audio: true,
        });
        await resolveVideoCamDevices();
        const canFlip = (videoCamDevices?.count || 0) > 1 || (videoCamDevices?.front && videoCamDevices?.back);
        $('videoFlipBtn').style.display = canFlip ? '' : 'none';
        if (videoDiscard) {
          hideVideoOverlay();
          videoStarting = false;
          return;
        }

        const preview = $('videoRecPreview');
        preview.srcObject = videoStream;
        applyVideoPreviewMirror();
        await preview.play().catch(() => {});

        const mime = videoMimeType();
        if (!mime) {
          hideVideoOverlay();
          videoStarting = false;
          showAppErr('браузер не умеет записывать видео — попробуй Safari/Chrome');
          return;
        }

        videoRecorder = new MediaRecorder(videoStream, { mimeType: mime });
        videoRecorder.ondataavailable = (e) => { if (e.data.size) videoChunks.push(e.data); };
        videoRecorder.onstop = async () => {
          const discard = videoDiscard;
          videoDiscard = false;
          const rec = videoRecorder;
          videoRecorder = null;
          videoStarting = false;
          cleanupVideoStream();
          stopVideoRecTimer();
          if (discard || !videoChunks.length) {
            videoChunks = [];
            hideVideoOverlay();
            return;
          }
          const type = rec.mimeType || videoChunks[0]?.type || 'video/webm';
          const blob = new Blob(videoChunks, { type });
          videoChunks = [];
          if (blob.size < 2000) {
            hideVideoOverlay();
            showAppErr('слишком короткое видео');
            return;
          }
          showVideoReviewUI(blob, type);
        };

        videoRecorder.start(250);
        videoStarting = false;
        videoRecStage = 'record';
        videoRecStarted = Date.now();
        $('videoRecStatus').textContent = '⭕ идёт запись';
        syncVideoRecPulse();
        videoRecTimer = setInterval(() => {
          updateVideoRecTimerDisplay();
          const sec = Math.floor(recElapsedMs(videoRecStarted, videoRecAccumPaused, videoRecPauseStart, videoRecorder?.state) / 1000);
          if (sec >= 60) stopVideoRecorder();
        }, 200);
      } catch (e) {
        hideVideoOverlay();
        videoStarting = false;
        videoRecorder = null;
        const n = e?.name || '';
        if (n === 'NotAllowedError') showAppErr('нет доступа к камере');
        else showAppErr('не удалось включить камеру');
      }
    }

    function connectWs() {
      if (ws) ws.close();
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws?token=' + encodeURIComponent(token));
      ws.onopen = () => { wsJoinAllChats(); };
      ws.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'message' && msg.message) {
            handleIncomingWsMessage(msg.message);
          }
          if (msg.type === 'message_edit' && msg.message) {
            if (activeChat && msg.message.chatId === activeChat.id) {
              replaceMessage(msg.message.id, msg.message);
            }
            refreshChatList();
          }
          if (msg.type === 'message_reaction' && msg.message) {
            if (activeChat && msg.message.chatId === activeChat.id) {
              replaceMessage(msg.message.id, msg.message);
            }
          }
          if (msg.type === 'read' && msg.chatId) {
            if (activeChat && msg.chatId === activeChat.id && msg.readerId !== user.id) {
              refreshReadTicks();
            }
            if (msg.readerId === user?.id) {
              if (typeof msg.unreadCount === 'number') {
                setChatUnreadCount(msg.chatId, msg.unreadCount);
              } else if (msg.chatId === activeChat?.id) {
                setChatUnreadCount(msg.chatId, countActiveChatUnread());
              }
              updateChatListBadges();
              updateInChatUnreadBadge();
            }
          }
        } catch (_) {}
      };
    }

      touchChatActivity();

      $('chatList').classList.add('hidden');
      $('chatView').classList.remove('hidden');
      updateChatHeader(chat);

        history.pushState(
          { glink: 'chat', chatId: chat.id },
          '',
          '#chat/' + encodeURIComponent(chat.id),
        );
      }
      try {

    async function saveEdit() {
      const id = editingMessageId;
      const text = $('msgInput').value.trim();
      const m = getMessage(id);
      if (!id || !m || !activeChat) {
        cancelEdit();
        return;
      }

      const snapText = $('msgInput').value;
      const snapAttachments = draftAttachments.map((x) => ({ ...x }));

      const keepFileIds = draftAttachments
        .filter((x) => x.existingFileId)
        .map((x) => x.existingFileId);
      const newItems = draftAttachments.filter((x) => x.file);

      if (!text && !draftAttachments.length) {
        showAppErr('нужен текст или хотя бы один файл');
        return;
      }

      const textSame = text === (m.text || '');
      const filesSame = !editAttachmentsChanged(m, draftAttachments);
      if (textSame && filesSame) {
        cancelEdit();
        return;
      }

      cancelEdit();
      try {
        let data;
        if (newItems.length) {
          const fd = new FormData();
          fd.append('text', text);
          fd.append('keepFileIds', JSON.stringify(keepFileIds));
          for (const item of newItems) {
            fd.append('files', item.file, item.file.name || 'upload');
            fd.append('kinds', item.kind || uploadKind(item.file));
          }
          data = await api('/chats/' + activeChat.id + '/messages/' + id, {
            method: 'PATCH',
            body: fd,
          });
        } else if (!filesSame) {
          data = await api('/chats/' + activeChat.id + '/messages/' + id, {
            method: 'PATCH',
            body: JSON.stringify({ text, keepFileIds }),
          });
        } else {
          data = await api('/chats/' + activeChat.id + '/messages/' + id, {
            method: 'PATCH',
            body: JSON.stringify({ text }),
          });
        }
        replaceMessage(id, data.message);
        refreshChatList();
      } catch (e) {
        editingMessageId = id;
        $('msgInput').value = snapText;
        clearDraftAttachments(true);
        for (const item of snapAttachments) {
          if (item.existingFileId) {
            draftAttachments.push({ ...item });
          } else if (item.file) {
            draftAttachments.push({
              ...item,
              url: URL.createObjectURL(item.file),
            });
          }
        }
        renderDraftAttachments();
        $('composer').classList.add('editing');
        $('editBanner').classList.remove('hidden');
        resizeMsgInput();
        showAppErr(e.message || 'не удалось сохранить');
      }
    }

    async function sendText() {
      if (editingMessageId) {
        await saveEdit();
        return;
      }
      const text = $('msgInput').value.trim();
      if (!activeChat || (!text && !hasDraftAttachments())) return;
      touchChatActivity();

      if (hasDraftAttachments()) {
        const items = draftAttachments.map((x) => ({ file: x.file, kind: x.kind }));
        $('msgInput').value = '';
        resizeMsgInput();
        clearDraftAttachments(true);
        clearActiveChatDraft();
        userPinnedBottom = true;
        try {
          await sendFiles(items, text || undefined);
        } catch (e) {
          restoreDraftAttachments(items.map((x) => ({ file: x.file, kind: x.kind })));
          $('msgInput').value = text;
          resizeMsgInput();
          showAppErr(e.message || 'не удалось отправить');
        }
        return;
      }

      $('msgInput').value = '';
      resizeMsgInput();
      userPinnedBottom = true;
      clearActiveChatDraft();
      const pendingId = 'pending-' + Date.now();
      appendMessage({
        id: pendingId,
        senderId: user.id,
        kind: 'text',
        text,
        status: 'sent',
        _pending: true,
      }, { forceBottom: true });
      upsertActiveMessage({ id: pendingId, senderId: user.id, kind: 'text', text, _pending: true });

      try {
        const data = await api('/chats/' + activeChat.id + '/messages', {
          method: 'POST',
          body: JSON.stringify({ text }),
        });
        replaceMessage(pendingId, data.message);
        upsertActiveMessage(data.message);
        refreshChatList();
      } catch (e) {
        removeMessage(pendingId);
        $('msgInput').value = text;
        resizeMsgInput();
        showAppErr(e.message || 'не удалось отправить');
      }
    }

    async function sendFiles(items, caption) {
      if (!activeChat || !items?.length) return;
      userPinnedBottom = true;
      const pendingId = 'pending-' + Date.now();
      const multi = items.length > 1;
      const msgKind = multi ? 'album' : (items[0].kind || 'file');
      appendMessage({
        id: pendingId,
        senderId: user.id,
        kind: msgKind,
        text: caption || '',
        files: items.map((x) => ({ name: x.file.name || 'файл', kind: x.kind })),
        file: items[0] ? { name: items[0].file.name || 'файл' } : null,
        status: 'sent',
        _pending: true,
      }, { forceBottom: true });

      const fd = new FormData();
      for (const item of items) {
        fd.append('files', item.file, item.file.name || 'upload');
        fd.append('kinds', item.kind || uploadKind(item.file));
      }
      if (caption) fd.append('text', caption);
      try {
        const data = await api('/chats/' + activeChat.id + '/messages', { method: 'POST', body: fd });
        replaceMessage(pendingId, data.message);
        upsertActiveMessage(data.message);
        refreshChatList();
      } catch (e) {
        removeMessage(pendingId);
        throw e;
      }
    }

    function fileFromClipboard(dataTransfer) {
      if (!dataTransfer?.items?.length) return null;
      for (const item of dataTransfer.items) {
        if (item.kind !== 'file') continue;
        const type = (item.type || '').toLowerCase();
        if (!type.startsWith('image/')) continue;
        const blob = item.getAsFile();
        if (!blob) continue;
        let ext = '.png';
        if (type.includes('jpeg') || type.includes('jpg')) ext = '.jpg';
        else if (type.includes('webp')) ext = '.webp';
        else if (type.includes('gif')) ext = '.gif';
        return new File([blob], 'photo' + ext, { type: type || blob.type || 'image/png' });
      }
      return null;
    }

    async function onPasteImage(ev) {
      if (!activeChat) return;
      if ($('app').classList.contains('hidden')) return;
      if (!$('voiceRecOverlay').classList.contains('hidden')) return;
      if (!$('videoRecOverlay').classList.contains('hidden')) return;
      const file = fileFromClipboard(ev.clipboardData);
      if (!file) return;
      ev.preventDefault();
      setDraftAttachment(file, 'image');
    }

    function voiceMimeType() {
      const apple = /iPad|iPhone|iPod/.test(navigator.userAgent)
        || (navigator.userAgent.includes('Mac') && 'ontouchend' in document);
      const types = apple
        ? ['audio/mp4', 'audio/aac', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg']
        : ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
      return types.find((t) => MediaRecorder.isTypeSupported(t)) || '';
    }

    function voiceExt(mime) {
      if (mime.includes('mp4')) return '.m4a';
      if (mime.includes('ogg')) return '.ogg';
      return '.webm';
    }

    function cleanupVoiceStream() {
      voiceStream?.getTracks().forEach((t) => t.stop());
      voiceStream = null;
    }

    function stopVoiceRecTimer() {
      clearInterval(voiceRecInterval);
      voiceRecInterval = null;
    }

    function hideVoiceOverlay() {
      $('voiceRecOverlay').classList.add('hidden');
      cleanupVoiceStream();
      stopVoiceRecTimer();
      clearVoiceReview();
      voiceRecStage = 'idle';
      voiceRecAccumPaused = 0;
      voiceRecPauseStart = 0;
      $('voiceRecTimer').textContent = '0:00';
      $('voiceRecStatus').textContent = '';
      $('voicePauseBtn').textContent = '⏸';
      resetRecPulseUI();
      showVoiceRecordUI();
      $('mediaBtn').classList.remove('recording');
    }

    function stopVoiceRecorder() {
      if (mediaRecorder?.state === 'recording' || mediaRecorder?.state === 'paused') {
        try { mediaRecorder.requestData(); } catch { /* ignore */ }
        mediaRecorder.stop();
      } else {
        hideVoiceOverlay();
        mediaRecorder = null;
        voiceStarting = false;
      }
    }

    function toggleVoiceRecPause() {
      if (!mediaRecorderCanPause() || !mediaRecorder) return;
      if (mediaRecorder.state === 'recording') {
        mediaRecorder.pause();
        voiceRecPauseStart = Date.now();
        $('voicePauseBtn').textContent = '▶';
        $('voiceRecStatus').textContent = '⏸ пауза';
      } else if (mediaRecorder.state === 'paused') {
        voiceRecAccumPaused += Date.now() - voiceRecPauseStart;
        voiceRecPauseStart = 0;
        mediaRecorder.resume();
        $('voicePauseBtn').textContent = '⏸';
        $('voiceRecStatus').textContent = '🎤 идёт запись';
      }
      syncVoiceRecPulse();
    }

    function attachVoiceReview() {
      if (!voiceReviewBlob) return;
      const type = voiceReviewBlob.type || 'audio/webm';
      const ext = voiceExt(type);
      addDraftAttachment(new File([voiceReviewBlob], 'voice' + ext, { type }), 'voice');
      hideVoiceOverlay();
    }

    function cancelVoiceRecording() {
      if (voiceRecStage === 'review') {
        hideVoiceOverlay();
        return;
      }
      voiceDiscard = true;
      stopVoiceRecorder();
      if (voiceStarting) {
        hideVoiceOverlay();
        voiceStarting = false;
        voiceChunks = [];
      }
    }

    async function openVoiceRecorder() {
      if (!activeChat || mediaRecorder || voiceStarting || videoRecorder || videoStarting) return;
      if (!window.MediaRecorder) {
        showAppErr('запись голоса не поддерживается — обнови браузер');
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia) {
        showAppErr('микрофон недоступен — нужен HTTPS');
        return;
      }
      if (!window.isSecureContext && location.hostname !== 'localhost') {
        showAppErr('голосовые работают только по HTTPS');
        return;
      }

      voiceStarting = true;
      voiceDiscard = false;
      voiceChunks = [];
      voiceRecAccumPaused = 0;
      voiceRecPauseStart = 0;
      clearVoiceReview();
      showVoiceRecordUI();
      $('voiceRecOverlay').classList.remove('hidden');
      $('voiceRecStatus').textContent = 'включаю микрофон…';
      $('voiceRecTimer').textContent = '0:00';
      $('voicePauseBtn').textContent = '⏸';
      if (!mediaRecorderCanPause()) $('voicePauseBtn').style.display = 'none';
      else $('voicePauseBtn').style.display = '';
      $('mediaBtn').classList.add('recording');

      try {
        voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        if (voiceDiscard) {
          hideVoiceOverlay();
          voiceStarting = false;
          return;
        }

        const mime = voiceMimeType();
        if (!mime) {
          hideVoiceOverlay();
          voiceStarting = false;
          showAppErr('браузер не умеет записывать голос');
          return;
        }

        mediaRecorder = new MediaRecorder(voiceStream, { mimeType: mime });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size) voiceChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          const discard = voiceDiscard;
          voiceDiscard = false;
          const rec = mediaRecorder;
          mediaRecorder = null;
          voiceStarting = false;
          cleanupVoiceStream();
          stopVoiceRecTimer();
          if (discard || !voiceChunks.length) {
            voiceChunks = [];
            hideVoiceOverlay();
            return;
          }
          const type = rec.mimeType || voiceChunks[0]?.type || 'audio/webm';
          const blob = new Blob(voiceChunks, { type });
          voiceChunks = [];
          if (blob.size < 800) {
            hideVoiceOverlay();
            showAppErr('слишком короткое — говори дольше');
            return;
          }
          showVoiceReviewUI(blob);
        };

        mediaRecorder.start(250);
        voiceStarting = false;
        voiceRecStage = 'record';
        voiceRecStarted = Date.now();
        $('voiceRecStatus').textContent = '🎤 идёт запись';
        syncVoiceRecPulse();
        voiceRecInterval = setInterval(() => {
          updateVoiceRecTimerDisplay();
          const sec = Math.floor(recElapsedMs(voiceRecStarted, voiceRecAccumPaused, voiceRecPauseStart, mediaRecorder?.state) / 1000);
          if (sec >= 120) stopVoiceRecorder();
        }, 200);
      } catch (e) {
        hideVoiceOverlay();
        voiceStarting = false;
        mediaRecorder = null;
        const n = e?.name || '';
        if (n === 'NotAllowedError' || n === 'PermissionDeniedError') {
          showAppErr('нет доступа — разреши микрофон');
        } else if (n === 'NotFoundError') {
          showAppErr('микрофон не найден');
        } else {
          showAppErr('не удалось включить микрофон');
        }
      }
    }

    function stopVideoRecTimer() {
      clearInterval(videoRecTimer);
      videoRecTimer = null;
    }

    $('profileBtn').onclick = () => openProfileSheet();
    $('profileClose').onclick = () => closeProfileSheet();
    $('profileLogout').onclick = () => doLogout();
    $('profileAvatarBtn').onclick = () => openAvatarMenu();
    $('avatarMenuPick').onclick = () => $('avatarInput').click();
    $('avatarMenuDelete').onclick = () => deleteAvatar();
    $('avatarMenuCancel').onclick = () => closeAvatarMenu();
    $('avatarMenuSheet').onclick = (e) => {
      if (e.target === $('avatarMenuSheet')) closeAvatarMenu();
    };
    $('avatarInput').onchange = (e) => {
      const f = e.target.files?.[0];
      e.target.value = '';
      if (f) openAvatarCropFromFile(f);
    };
    $('avatarCropCancel').onclick = () => closeAvatarCrop();
    $('avatarCropSave').onclick = async () => {
      try {
        const blob = await exportAvatarCropBlob();
        closeAvatarCrop();
        await uploadAvatar(blob);
      } catch (_) {
        showAppErr('не удалось сохранить фото');
      }
    };
    $('avatarCropZoom').oninput = () => {
      if (!avatarCrop) return;
      avatarCrop.zoom = Number($('avatarCropZoom').value);
      clampAvatarCropPan();
      drawAvatarCrop();
    };
    (function bindAvatarCropPan() {
      const stage = $('avatarCropStage');
      stage.addEventListener('pointerdown', (e) => {
        if (!avatarCrop) return;
        avatarCropPan = {
          id: e.pointerId,
          x: e.clientX,
          y: e.clientY,
          ox: avatarCrop.ox,
          oy: avatarCrop.oy,
        };
        stage.setPointerCapture(e.pointerId);
      });
      stage.addEventListener('pointermove', (e) => {
        if (!avatarCropPan || avatarCropPan.id !== e.pointerId || !avatarCrop) return;
        avatarCrop.ox = avatarCropPan.ox + (e.clientX - avatarCropPan.x);
        avatarCrop.oy = avatarCropPan.oy + (e.clientY - avatarCropPan.y);
        clampAvatarCropPan();
        drawAvatarCrop();
      });
      const endPan = (e) => {
        if (avatarCropPan?.id === e.pointerId) avatarCropPan = null;
      };
      stage.addEventListener('pointerup', endPan);
      stage.addEventListener('pointercancel', endPan);
    })();
    $('profileSheet').onclick = (e) => {
      if (e.target === $('profileSheet')) closeProfileSheet();
    };
    $('backBtn').onclick = (e) => { e.preventDefault(); userGoBack(); };
    $('editCancelBtn').onclick = (e) => { e.preventDefault(); cancelEdit(); };
    $('sendBtn').onclick = sendText;
    $('msgInput').onkeydown = (e) => {
      if (e.key === 'ArrowUp' && !e.shiftKey && !e.altKey && !e.ctrlKey && !e.metaKey) {
        const input = $('msgInput');
        if (!editingMessageId && input.value === '') {
          const m = getLastEditableMessage();
          if (m) {
            e.preventDefault();
            startEditMessage(m);
          }
        }
        return;
      }
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendText();
        return;
      }
      if (e.key === 'Escape' && editingMessageId) cancelEdit();
    };
    $('msgInput').addEventListener('input', () => {
      showAppErr('');
      resizeMsgInput();
      syncActiveChatDraftState();
    });
    $('fileInput').onchange = onFilePicked;
    document.addEventListener('paste', onPasteImage);

    const MEDIA_ICONS = {
      attach: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.5 6v11.5a4 4 0 01-8 0V5a2.5 2.5 0 015 0v10.5a1 1 0 11-2 0V6H9v9.5a3.5 3.5 0 007 0V5a4 4 0 00-8 0v12.5a5.5 5.5 0 0011 0V6h-1.5z"/></svg>',
      voice: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-5 5 5 5 0 01-5-5H5a7 7 0 0014 0h-2zM11 21h2v-2h-2v2z"/></svg>',
      video: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M9 3 7.17 5H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V7a2 2 0 00-2-2h-3.17L15 3H9zm3 15a4 4 0 110-8 4 4 0 010 8z"/></svg>',
    };

    const MEDIA_MODES = [
      { id: 'attach', title: 'Файл · нажми — сменить, зажми — выбрать' },
      { id: 'voice', title: 'Голос · нажми — сменить, зажми — записать' },
      { id: 'video', title: 'Кружок · нажми — сменить, зажми — записать' },
    ];
    let mediaModeIndex = 0;
    let mediaHoldTimer = null;
    let mediaHoldFired = false;
    let mediaPointerId = null;
    const MEDIA_HOLD_MS = 420;

    function updateMediaBtn() {
      const m = MEDIA_MODES[mediaModeIndex];
      const btn = $('mediaBtn');
      btn.innerHTML = '<span class="media-icon">' + MEDIA_ICONS[m.id] + '</span>';
      btn.title = m.title;
      btn.setAttribute('aria-label', m.title.split(' · ')[0]);
    }

    function cycleMediaMode() {
      mediaModeIndex = (mediaModeIndex + 1) % MEDIA_MODES.length;
      updateMediaBtn();
    }

    function activateMediaMode() {
      const mode = MEDIA_MODES[mediaModeIndex].id;
      if (mode === 'attach') $('fileInput').click();
      else if (mode === 'voice') openVoiceRecorder();
      else if (mode === 'video') openVideoRecorder();
    }

    function clearMediaHold() {
      clearTimeout(mediaHoldTimer);
      mediaHoldTimer = null;
      $('mediaBtn').classList.remove('holding');
    }

    function onMediaPointerDown(e) {
      if (mediaPointerId !== null) return;
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      mediaPointerId = e.pointerId;
      mediaHoldFired = false;
      $('mediaBtn').setPointerCapture(e.pointerId);
      $('mediaBtn').classList.add('holding');
      mediaHoldTimer = setTimeout(() => {
        if (mediaPointerId !== e.pointerId) return;
        mediaHoldFired = true;
        clearMediaHold();
        activateMediaMode();
      }, MEDIA_HOLD_MS);
    }

    function onMediaPointerUp(e) {
      if (e.pointerId !== mediaPointerId) return;
      mediaPointerId = null;
      clearMediaHold();
      if (!mediaHoldFired) cycleMediaMode();
    }

    function onMediaPointerCancel(e) {
      if (e.pointerId !== mediaPointerId) return;
      mediaPointerId = null;
      mediaHoldFired = true;
      clearMediaHold();
    }

    const mediaBtnEl = $('mediaBtn');
    mediaBtnEl.addEventListener('pointerdown', onMediaPointerDown);
    mediaBtnEl.addEventListener('pointerup', onMediaPointerUp);
    mediaBtnEl.addEventListener('pointercancel', onMediaPointerCancel);
    mediaBtnEl.addEventListener('contextmenu', (e) => e.preventDefault());
    updateMediaBtn();

    $('voiceCancelBtn').onclick = (e) => { e.preventDefault(); cancelVoiceRecording(); };
    $('voicePauseBtn').onclick = (e) => { e.preventDefault(); toggleVoiceRecPause(); };
    $('voiceStopBtn').onclick = (e) => { e.preventDefault(); stopVoiceRecorder(); };
    $('voiceReviewPlay').onclick = (e) => { e.preventDefault(); toggleVoiceReviewPlay(); };
    $('voiceReviewCancelBtn').onclick = (e) => { e.preventDefault(); hideVoiceOverlay(); };
    $('voiceReviewRedoBtn').onclick = (e) => { e.preventDefault(); hideVoiceOverlay(); openVoiceRecorder(); };
    $('voiceReviewAttachBtn').onclick = (e) => { e.preventDefault(); attachVoiceReview(); };
    $('videoCancelBtn').onclick = (e) => { e.preventDefault(); cancelVideoRecording(); };
    $('videoFlipBtn').onclick = (e) => { e.preventDefault(); flipVideoCamera(); };
    $('videoPauseBtn').onclick = (e) => { e.preventDefault(); toggleVideoRecPause(); };
    $('videoStopBtn').onclick = (e) => { e.preventDefault(); stopVideoRecorder(); };
    $('videoReviewCancelBtn').onclick = (e) => { e.preventDefault(); hideVideoOverlay(); };
    $('videoReviewRedoBtn').onclick = (e) => { e.preventDefault(); hideVideoOverlay(); openVideoRecorder(); };
    $('videoReviewAttachBtn').onclick = (e) => { e.preventDefault(); attachVideoReview(); };

    const messagesEl = $('messages');
    messagesEl.addEventListener('scroll', () => {
      if (suppressScrollTrack || !activeChat) return;
      markUserScrolling();
      touchChatActivity();
      userPinnedBottom = isAtBottom(messagesEl);
      scheduleMarkVisibleRead();
      updateInChatUnreadBadge();
    }, { passive: true });
    messagesEl.addEventListener('wheel', () => { markUserScrolling(); }, { passive: true });
    messagesEl.addEventListener('touchstart', () => { markUserScrolling(); }, { passive: true });
    messagesEl.addEventListener('touchmove', () => { markUserScrolling(); }, { passive: true });

    $('messages').addEventListener('selectstart', (e) => {
      if (e.target.closest('.msg-hit, .msg-reaction-pill')) e.preventDefault();
    });

    $('messages').addEventListener('click', (e) => {
      const pill = e.target.closest('.msg-reaction-pill');
      if (!pill) return;
      e.preventDefault();
      e.stopPropagation();
      const row = pill.closest('.msg-row');
      const reaction = pill.dataset.reaction;
      if (row && reaction) toggleReaction(row.dataset.id, reaction);
    });

    $('messages').addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      const hit = e.target.closest('.msg-hit');
      if (!hit) return;
      const row = hit.closest('.msg-row');
      if (!row) return;
      const m = getMessage(row.dataset.id);
      if (!m || m._pending) return;
      msgPressRow = row;
      msgPressTimer = setTimeout(() => {
        if (msgPressRow !== row) return;
        if (!canOpenMsgMenuNow()) return;
        openMsgMenu(m, row);
        clearMsgPress();
      }, MSG_PRESS_MS);
    });
    $('messages').addEventListener('pointerup', (e) => {
      const hit = e.target.closest('.msg-hit');
      if (!hit) return;
      const row = hit.closest('.msg-row');
      const wasTimer = msgPressTimer;
      const sameRow = msgPressRow === row;
      clearMsgPress();
      if (!row || !sameRow || !wasTimer) return;
      if (tryDoubleTapHeart(row)) return;
      if (!canOpenMsgMenuNow()) return;
      const rid = row.dataset.id;
      clearMsgMenuDelay();
      msgMenuDelayTimer = setTimeout(() => {
        msgMenuDelayTimer = null;
        if (lastMsgTap.id === rid && Date.now() - lastMsgTap.at < DBL_TAP_MS) return;
        if (!canOpenMsgMenuNow()) return;
        const m = getMessage(rid);
        if (m) openMsgMenu(m, row);
      }, DBL_TAP_MS);
    });
    $('messages').addEventListener('pointercancel', clearMsgPress);
    $('messages').addEventListener('pointermove', (e) => {
      if (!msgPressTimer || !msgPressRow) return;
      if (!e.target.closest('.msg-hit') || !msgPressRow.contains(e.target.closest('.msg-hit'))) {
        clearMsgPress();
      }
    });
    $('messages').addEventListener('dblclick', (e) => {
      const hit = e.target.closest('.msg-hit');
      if (!hit) return;
      const row = hit.closest('.msg-row');
      if (!row) return;
      e.preventDefault();
      clearTextSelection();
      lastMsgTap = { id: null, at: 0 };
      clearMsgMenuDelay();
      closeMsgMenu();
      blockMsgMenuOpen();
      const m = getMessage(row.dataset.id);
      const existing = m && (m.reactions || {})[user?.id];
      if (m && !m._pending && (!existing || existing === 'heart')) {
        toggleReaction(row.dataset.id, 'heart');
      }
    });
    $('messages').addEventListener('contextmenu', (e) => {
      const row = findMsgRowForContextMenu(e);
      if (!row) return;
      e.preventDefault();
      if (!canOpenMsgMenuNow()) {
        closeMsgMenu();
        blockMsgMenuOpen();
        return;
      }
      const m = getMessage(row.dataset.id);
      if (m) openMsgMenu(m, row);
    });

    $('msgMenu').querySelectorAll('.msg-menu-reactions button').forEach((btn) => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const id = msgMenuTargetId;
        const reaction = btn.dataset.reaction;
        if (!id || !reaction) return;
        closeMsgMenu();
        toggleReaction(id, reaction);
      };
    });
    $('msgMenuCopy').onclick = async (e) => {
      e.stopPropagation();
      const m = getMessage(msgMenuTargetId);
      closeMsgMenu();
      if (m) await copyMessageText(m);
    };
    $('msgMenuEdit').onclick = (e) => {
      e.stopPropagation();
      const m = getMessage(msgMenuTargetId);
      closeMsgMenu();
      if (m) startEditMessage(m);
    };
    $('appErr').onclick = (e) => {
      if (e.target.closest('#appErrDismiss') || e.target === $('appErr')) showAppErr('');
    };
    $('appErrDismiss').onclick = (e) => { e.stopPropagation(); showAppErr(''); };
    document.addEventListener('pointerdown', (e) => {
      if (!$('msgMenu').classList.contains('hidden') && !e.target.closest('#msgMenu')) {
        closeMsgMenu();
        blockMsgMenuOpen();
      }
    }, true);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !$('msgMenu').classList.contains('hidden')) {
        closeMsgMenu();
      }
      if (e.key === 'Escape' && !$('profileSheet').classList.contains('hidden')) {
        closeProfileSheet();
      }
      if (e.key === 'Escape' && !$('avatarCropSheet').classList.contains('hidden')) {
        closeAvatarCrop();
      }
      if (e.key === 'Escape' && !$('avatarMenuSheet').classList.contains('hidden')) {
        closeAvatarMenu();
      }
    });

    (async () => {
      if (!token) return showLogin();
      try {
        const me = await api('/me');
        user = me.user;
        await enterApp();
      } catch (e) {
        if (e.code === 'unauthorized') {
          clearToken();
          showLogin('сессия истекла — нажми на себя');
          return;
        }
        if (user) { showApp(); showAppErr(e?.message || 'ошибка'); return; }
        showLogin(e?.message);
      }
    })();
  </script>
</body>
