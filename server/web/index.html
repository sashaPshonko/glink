          hideVoiceOverlay();
          voiceStarting = false;
          showAppErr('браузер не умеет записывать голос');
          return;
        }

        mediaRecorder = new MediaRecorder(voiceStream, { mimeType: mime });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size) voiceChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          const discard = voiceDiscard;
          voiceDiscard = false;
          const rec = mediaRecorder;
          mediaRecorder = null;
          voiceStarting = false;
          hideVoiceOverlay();
          if (discard || !voiceChunks.length) {
            voiceChunks = [];
            return;
          }
          const type = rec.mimeType || voiceChunks[0]?.type || 'audio/webm';
          const blob = new Blob(voiceChunks, { type });
          voiceChunks = [];
          if (blob.size < 800) {
            showAppErr('слишком короткое — говори дольше');
            return;
          }
          const ext = voiceExt(type);
          try {
            await sendFile(new File([blob], 'voice' + ext, { type }), 'voice');
          } catch (e) {
            showAppErr(e.message || 'не удалось отправить голосовое');
          }
        };

        mediaRecorder.start(250);
        voiceStarting = false;
        voiceRecStarted = Date.now();
        $('voiceRecStatus').textContent = '🎤 идёт запись';
        voiceRecInterval = setInterval(() => {
          const sec = Math.floor((Date.now() - voiceRecStarted) / 1000);
          $('voiceRecTimer').textContent = fmtTime(sec);
          if (sec >= 120) finishVoiceRecording();
        }, 200);
      } catch (e) {
        hideVoiceOverlay();
        voiceStarting = false;
        mediaRecorder = null;
        const n = e?.name || '';
        if (n === 'NotAllowedError' || n === 'PermissionDeniedError') {
          showAppErr('нет доступа — разреши микрофон');
        } else if (n === 'NotFoundError') {
          showAppErr('микрофон не найден');
        } else {
          showAppErr('не удалось включить микрофон');
        }
      }
    }

    function stopVideoRecTimer() {
      clearInterval(videoRecTimer);
      videoRecTimer = null;
    }

    $('logoutBtn').onclick = () => {
      clearToken();
      if (ws) ws.close();
      clearInterval(pollTimer);
      cancelVoiceRecording();
      cancelVideoRecording();
      showLogin();
    };
    $('backBtn').onclick = (e) => { e.preventDefault(); userGoBack(); };
    $('editCancelBtn').onclick = (e) => { e.preventDefault(); cancelEdit(); };
    $('sendBtn').onclick = sendText;
    $('msgInput').onkeydown = (e) => {
      if (e.key === 'ArrowUp' && !e.shiftKey && !e.altKey && !e.ctrlKey && !e.metaKey) {
        const input = $('msgInput');
        if (!editingMessageId && input.value === '') {
          const m = getLastEditableMessage();
          if (m) {
            e.preventDefault();
            startEditMessage(m);
          }
        }
        return;
      }
      if (e.key === 'Enter') sendText();
      if (e.key === 'Escape' && editingMessageId) cancelEdit();
    };
    $('fileInput').onchange = onFilePicked;

    const MEDIA_ICONS = {
      attach: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.5 6v11.5a4 4 0 01-8 0V5a2.5 2.5 0 015 0v10.5a1 1 0 11-2 0V6H9v9.5a3.5 3.5 0 007 0V5a4 4 0 00-8 0v12.5a5.5 5.5 0 0011 0V6h-1.5z"/></svg>',
      voice: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-5 5 5 5 0 01-5-5H5a7 7 0 0014 0h-2zM11 21h2v-2h-2v2z"/></svg>',
      video: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M9 3 7.17 5H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V7a2 2 0 00-2-2h-3.17L15 3H9zm3 15a4 4 0 110-8 4 4 0 010 8z"/></svg>',
    };

    const MEDIA_MODES = [
      { id: 'attach', title: 'Файл · нажми — сменить, зажми — выбрать' },
      { id: 'voice', title: 'Голос · нажми — сменить, зажми — записать' },
      { id: 'video', title: 'Кружок · нажми — сменить, зажми — записать' },
    ];
    let mediaModeIndex = 0;
    let mediaHoldTimer = null;
    let mediaHoldFired = false;
    let mediaPointerId = null;
    const MEDIA_HOLD_MS = 420;

    function updateMediaBtn() {
      const m = MEDIA_MODES[mediaModeIndex];
      const btn = $('mediaBtn');
      btn.innerHTML = '<span class="media-icon">' + MEDIA_ICONS[m.id] + '</span>';
      btn.title = m.title;
      btn.setAttribute('aria-label', m.title.split(' · ')[0]);
    }

    function cycleMediaMode() {
      mediaModeIndex = (mediaModeIndex + 1) % MEDIA_MODES.length;
      updateMediaBtn();
    }

    function activateMediaMode() {
      const mode = MEDIA_MODES[mediaModeIndex].id;
      if (mode === 'attach') $('fileInput').click();
      else if (mode === 'voice') openVoiceRecorder();
      else if (mode === 'video') openVideoRecorder();
    }

    function clearMediaHold() {
      clearTimeout(mediaHoldTimer);
      mediaHoldTimer = null;
      $('mediaBtn').classList.remove('holding');
    }

    function onMediaPointerDown(e) {
      if (mediaPointerId !== null) return;
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      mediaPointerId = e.pointerId;
      mediaHoldFired = false;
      $('mediaBtn').setPointerCapture(e.pointerId);
      $('mediaBtn').classList.add('holding');
      mediaHoldTimer = setTimeout(() => {
        if (mediaPointerId !== e.pointerId) return;
        mediaHoldFired = true;
        clearMediaHold();
        activateMediaMode();
      }, MEDIA_HOLD_MS);
    }

    function onMediaPointerUp(e) {
      if (e.pointerId !== mediaPointerId) return;
      mediaPointerId = null;
      clearMediaHold();
      if (!mediaHoldFired) cycleMediaMode();
    }

    function onMediaPointerCancel(e) {
      if (e.pointerId !== mediaPointerId) return;
      mediaPointerId = null;
      mediaHoldFired = true;
      clearMediaHold();
    }

    const mediaBtnEl = $('mediaBtn');
    mediaBtnEl.addEventListener('pointerdown', onMediaPointerDown);
    mediaBtnEl.addEventListener('pointerup', onMediaPointerUp);
    mediaBtnEl.addEventListener('pointercancel', onMediaPointerCancel);
    mediaBtnEl.addEventListener('contextmenu', (e) => e.preventDefault());
    updateMediaBtn();

    $('voiceCancelBtn').onclick = (e) => { e.preventDefault(); cancelVoiceRecording(); };
    $('voiceSendBtn').onclick = (e) => { e.preventDefault(); finishVoiceRecording(); };
    $('videoCancelBtn').onclick = (e) => { e.preventDefault(); cancelVideoRecording(); };
    $('videoSendBtn').onclick = (e) => { e.preventDefault(); finishVideoRecording(); };

    $('messages').addEventListener('scroll', () => {
      if (suppressScrollTrack || !activeChat) return;
      userPinnedBottom = isAtBottom($('messages'));
    }, { passive: true });

    $('messages').addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      const row = findMsgRowFromEvent(e);
      if (!row) return;
      const m = getMessage(row.dataset.id);
      if (!m || m._pending) return;
      msgPressRow = row;
      msgPressXY = { x: e.clientX, y: e.clientY };
      msgPressTimer = setTimeout(() => {
        if (msgPressRow !== row) return;
        openMsgMenu(m, e.clientX, e.clientY);
        clearMsgPress();
      }, MSG_PRESS_MS);
    });
    $('messages').addEventListener('pointerup', (e) => {
      const row = msgPressRow;
      const xy = msgPressXY;
      const wasTimer = msgPressTimer;
      clearMsgPress();
      if (!row || !wasTimer) return;
      if (tryDoubleTapHeart(row)) return;
      if (row.contains(e.target) && e.target.closest('.msg-hit')) {
        const rid = row.dataset.id;
        const cx = xy?.x ?? e.clientX;
        const cy = xy?.y ?? e.clientY;
        clearMsgMenuDelay();
        msgMenuDelayTimer = setTimeout(() => {
          msgMenuDelayTimer = null;
          if (lastMsgTap.id === rid && Date.now() - lastMsgTap.at < DBL_TAP_MS) return;
          const m = getMessage(rid);
          if (m) openMsgMenu(m, cx, cy);
        }, DBL_TAP_MS);
      }
    });
    $('messages').addEventListener('pointercancel', clearMsgPress);
    $('messages').addEventListener('pointermove', (e) => {
      if (!msgPressTimer || !msgPressRow) return;
      if (!msgPressRow.contains(e.target)) clearMsgPress();
    });
    $('messages').addEventListener('dblclick', (e) => {
      const row = findMsgRowFromEvent(e);
      if (!row) return;
      e.preventDefault();
      lastMsgTap = { id: null, at: 0 };
      clearMsgMenuDelay();
      closeMsgMenu();
      const m = getMessage(row.dataset.id);
      if (m && !m._pending) toggleReaction(row.dataset.id, 'heart');
    });
    $('messages').addEventListener('contextmenu', (e) => {
      const row = findMsgRowFromEvent(e);
      if (!row) return;
      e.preventDefault();
      const m = getMessage(row.dataset.id);
      if (m) openMsgMenu(m, e.clientX, e.clientY);
    });

    $('msgMenu').querySelectorAll('.msg-menu-reactions button').forEach((btn) => {
      btn.onclick = (e) => {
        e.stopPropagation();
        if (!msgMenuTargetId) return;
        toggleReaction(msgMenuTargetId, btn.dataset.reaction);
      };
    });
    $('msgMenuCopy').onclick = async (e) => {
      e.stopPropagation();
      const m = getMessage(msgMenuTargetId);
      closeMsgMenu();
      if (m) await copyMessageText(m);
    };
    $('msgMenuEdit').onclick = (e) => {
      e.stopPropagation();
      const m = getMessage(msgMenuTargetId);
      closeMsgMenu();
      if (m) startEditMessage(m);
    };
    $('appErr').onclick = (e) => {
      if (e.target.closest('#appErrDismiss') || e.target === $('appErr')) showAppErr('');
    };
    $('appErrDismiss').onclick = (e) => { e.stopPropagation(); showAppErr(''); };
    $('msgInput').addEventListener('input', () => showAppErr(''));
    document.addEventListener('pointerdown', (e) => {
      if (!$('msgMenu').classList.contains('hidden') && !e.target.closest('#msgMenu')) {
        closeMsgMenu();
      }
    }, true);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !$('msgMenu').classList.contains('hidden')) {
        closeMsgMenu();
      }
    });

    (async () => {
      if (!token) return showLogin();
      try {
        const me = await api('/me');
        user = me.user;
        await enterApp();
      } catch (e) {
        if (e.code === 'unauthorized') {
          clearToken();
          showLogin('сессия истекла — нажми на себя');
          return;
        }
        if (user) { showApp(); showAppErr(e?.message || 'ошибка'); return; }
        showLogin(e?.message);
      }
    })();
  </script>
</body>
